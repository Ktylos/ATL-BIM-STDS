name: Standard Amendment Proposal
description: Propose a change, addition, or removal in a published standard.
title: "[Amendment] "
labels: ["amendment-proposal"]
body:
  - type: dropdown
    id: standard
    attributes:
      label: Standard
      description: Which standard does your proposal relate to?
      options:
        - DC-GN-001 — File Naming and Organization
        - DC-GN-002 — BIM Modeling Best Practices
        - DC-GN-003 — Revit Project Setup
        - TP-GN-001 — BIM Execution Plan Template
        - TP-GN-002 — Information Delivery Plan
        - General / Multiple Standards
    validations:
      required: true

  - type: input
    id: section
    attributes:
      label: Section or Requirement
      description: Which section or specific requirement are you proposing to change?
      placeholder: e.g., "Section 4.1 — Sheet Numbering Convention"
    validations:
      required: true

  - type: textarea
    id: current_text
    attributes:
      label: Current Text / Requirement
      description: Quote or describe the existing requirement as it is currently published.
      placeholder: "Currently the standard states..."
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed Change
      description: Describe exactly what you are proposing. Be as specific as possible.
      placeholder: "I propose changing this to..."
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Explain why this change is needed. Include any relevant project experience, industry references, or practical challenges the current requirement creates.
    validations:
      required: true

  - type: input
    id: project
    attributes:
      label: Project Name (optional)
      description: If this proposal is driven by a specific project experience, provide the project name or number.
      placeholder: e.g., "Concourse T Expansion — 2026-ATL-0042"
    validations:
      required: false
